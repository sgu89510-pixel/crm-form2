<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lead Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 420px;
      margin: 60px auto;
      background: #fff;
      padding: 24px;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 24px;
      text-align: center;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 14px;
      border: 1px solid #d6dbe3;
      border-radius: 10px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      background: #111827;
      color: white;
      font-weight: 700;
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .message {
      margin-top: 16px;
      padding: 12px;
      border-radius: 10px;
      display: none;
      white-space: pre-line;
    }

    .success {
      display: block;
      background: #ecfdf5;
      color: #065f46;
      border: 1px solid #a7f3d0;
    }

    .error {
      display: block;
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .hint {
      font-size: 13px;
      color: #6b7280;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Оставить заявку</h1>

    <form id="leadForm">
      <div class="field">
        <label for="fname">Имя</label>
        <input type="text" id="fname" name="fname" placeholder="Иван" required />
      </div>

      <div class="field">
        <label for="lname">Фамилия</label>
        <input type="text" id="lname" name="lname" placeholder="Иванов" required />
      </div>

      <div class="field">
        <label for="fullphone">Номер телефона</label>
        <input
          type="tel"
          id="fullphone"
          name="fullphone"
          placeholder="+79991234567"
          required
        />
        <div class="hint">Формат: +79991234567</div>
      </div>

      <button type="submit" id="submitBtn">Отправить</button>
    </form>

    <div id="message" class="message"></div>
  </div>

  <script>
    const form = document.getElementById("leadForm");
    const messageBox = document.getElementById("message");
    const submitBtn = document.getElementById("submitBtn");

    function showMessage(text, type) {
      messageBox.className = "message " + type;
      messageBox.textContent = text;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      submitBtn.disabled = true;
      messageBox.className = "message";
      messageBox.textContent = "";

      const payload = {
        fname: document.getElementById("fname").value.trim(),
        lname: document.getElementById("lname").value.trim(),
        fullphone: document.getElementById("fullphone").value.trim()
      };

      try {
        const response = await fetch("/submit-lead", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (response.ok && data.success) {
          showMessage(
            `Лид успешно отправлен.\nID: ${data.lead_id || "-"}${data.autologin ? `\nAutologin: ${data.autologin}` : ""}`,
            "success"
          );
          form.reset();
        } else {
          showMessage(data.message || "Ошибка отправки лида", "error");
        }
      } catch (error) {
        showMessage("Ошибка соединения с сервером", "error");
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
